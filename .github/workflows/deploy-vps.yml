name: Deploy Web App to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build blog-web image and deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build blog-web image
        run: |
          docker buildx build --load \
            -f deploy/Dockerfile.vps \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }} \
            --build-arg VITE_GITHUB_CLIENT_ID=${{ secrets.VITE_GITHUB_CLIENT_ID }} \
            --build-arg VITE_APPLE_CLIENT_ID=${{ secrets.VITE_APPLE_CLIENT_ID }} \
            -t blog-web:latest .

      - name: Save image as tarball
        run: docker save blog-web:latest | gzip > blog-web.tar.gz

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: mgrinberg
          key: ${{ secrets.VPS_SSH_KEY }}
          source: blog-web.tar.gz
          target: /tmp/

      - name: Load image and restart on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: mgrinberg
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker load < /tmp/blog-web.tar.gz
            rm /tmp/blog-web.tar.gz
            cd /opt/micro-blogging
            docker compose -f docker-compose.vps.yml --env-file .env.vps up -d --force-recreate blog-web
            docker compose -f docker-compose.vps.yml --env-file .env.vps ps
